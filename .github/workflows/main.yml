name: CI/CD Pipeline — Build & Deploy to EC2

on:
  push:
    branches:
      - main               # triggers pipeline on every push to main

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Clone, Build & Test
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build Docker Image & Run Tests
    runs-on: ubuntu-latest

    steps:

      # ── STEP 1: Clone the repository ──────────
      - name: Checkout Code
        uses: actions/checkout@v4
        # This clones your repo into the GitHub Actions runner.
        # No extra config needed — it uses your repo automatically.

      # ── STEP 2: Set up Docker Buildx ──────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Enables advanced Docker build features (cache, multi-platform).

      # ── STEP 3: Log in to Docker Hub ──────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        # Authenticates to Docker Hub so we can push the built image.

      # ── STEP 4: Build Docker Image ────────────
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }} \
                     ${{ secrets.DOCKER_USERNAME }}/myapp:latest
        # Builds the image using your Dockerfile.
        # Tags it with both the commit SHA (for traceability) and "latest".

      # ── STEP 5: Smoke Tests ────────────
      - name: Run Tests (Smoke Test)
        run: |
          echo "Starting test container..."
          docker run --rm \
            --name test-container \
            ${{ secrets.DOCKER_USERNAME }}/myapp:latest \
            echo "✅ App started successfully — Smoke test passed!"
          
          echo "Running fake unit tests..."
          echo "  [PASS] test_homepage_loads"
          echo "  [PASS] test_db_connection"
          echo "  [PASS] test_api_response"
          echo "All tests passed ✅"
        # Starts your container and runs a basic smoke test.
        # Replace the echo commands with your real test runner,
        # e.g: pytest, npm test, go test ./... etc.

      # ── STEP 6: Push Image to Docker Hub ──────
      #- name: Push Docker Image to Docker Hub
      #  run: |
      #    docker push ${{ secrets.DOCKER_USERNAME }}/myapp:${{ github.sha }}
      #    docker push ${{ secrets.DOCKER_USERNAME }}/myapp:latest
        # Pushes the built image so EC2 can pull it in the next job.

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to EC2
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-test      # only runs if build-and-test job succeeds

    steps:

      # ── STEP 7: SSH into EC2 & Deploy ─────────
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "Pulling latest Docker image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/myapp:latest

            echo "Stopping existing container (if any)..."
            docker stop myapp-container || true
            docker rm   myapp-container || true

            echo "Starting new container..."
            docker run -d \
              --name myapp-container \
              --restart always \
              -p 80:3000 \
              -e NODE_ENV=production \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/myapp:latest

            echo "Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment complete!"
